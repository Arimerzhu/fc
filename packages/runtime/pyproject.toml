[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fc-runtime"
version = "0.1.0"
description = "FreeCAD Agent Runtime — Autonomous CAD design from natural language"
requires-python = ">=3.12"
dependencies = [
    "fc-core",
    "fc-cli",
    "pydantic>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/fc_runtime"]
